<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Precios - Turismo</title>
    <link rel="stylesheet" href="style/precios.css">
</head>
<body>
    <main class="precios-container">
        <header>
            <h1>Comparador de Destinos</h1>
            <p>Elegí el plan que mejor se adapte a tu próxima aventura.</p>
        </header>

        <section class="tabla-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Servicios Incluidos</th>
                        <th>Destino Cultural</th>
                        <th>Destino Playa</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            Acceso a Museos
                            <span class="tooltip-container" data-tooltip="Incluye acceso ilimitado a museos nacionales">i</span>
                        </td>
                        <td>✅</td>
                        <td>❌</td>
                    </tr>
                    <tr>
                        <td>
                            Guía Bilingüe
                            <span class="tooltip-container" data-tooltip="Disponible en Inglés, Portugués y Francés">i</span>
                        </td>
                        <td>✅</td>
                        <td>✅</td>
                    </tr>
                    <tr>
                        <td>
                            Equipamiento Deportivo
                            <span class="tooltip-container" data-tooltip="Equipos de Snorkel o trekking incluidos">i</span>
                        </td>
                        <td>❌</td>
                        <td>✅</td>
                    </tr>
                    <tr>
                        <td>
                            Traslados al Hotel
                            <span class="tooltip-container" data-tooltip="Desde el aeropuerto hasta la puerta del hotel">i</span>
                        </td>
                        <td>✅</td>
                        <td>✅</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
