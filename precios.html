<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Precios - Turismo Jujuy</title>
    <link rel="icon" href="images/index/logo.png" type="image/png">
    <!-- Bootstrap CSS -->
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- CSS propios -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/precios.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/sprites.css">
</head>

<body id="precios-page">
    <!-- Toggle Dark Mode CSS-Only -->
    <input type="checkbox" id="dark-mode-toggle" class="sr-only">

    <div id="header-placeholder"></div>

    <main class="precios-page">
        <section class="intro-precios">
            <h1>Tarifas de Destinos 2026</h1>
            <p>Comparativa detallada por regiones de la provincia de Jujuy.</p>
        </section>
        <section class="tabla-section container my-4">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle shadow-sm" id="tabla-precios">
                    <thead class="table-dark">
                        <tr>
                            <th>Servicios</th>
                            <th>Quebrada ($75k)</th>
                            <th>Puna ($65k)</th>
                            <th>Yungas ($55k)</th>
                            <th>Valles ($45k)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                Traslados <i class="fa-solid fa-circle-info text-primary ms-1" data-bs-toggle="tooltip"
                                    title="Desde San Salvador de Jujuy"></i>
                            </td>
                            <td>Privado</td>
                            <td>4x4 Especial</td>
                            <td>Grupal</td>
                            <td>Grupal</td>
                        </tr>
                        <tr>
                            <td>
                                Alojamiento <i class="fa-solid fa-circle-info text-primary ms-1"
                                    data-bs-toggle="tooltip" title="Hoteles certificados"></i>
                            </td>
                            <td>Boutique</td>
                            <td>Hostería</td>
                            <td>Ecolodge</td>
                            <td>Hotel 3*</td>
                        </tr>
                        <tr>
                            <td>
                                Guía Local <i class="fa-solid fa-circle-info text-primary ms-1" data-bs-toggle="tooltip"
                                    title="Guías certificados UNJU"></i>
                            </td>
                            <td>
                                <i class="fa-solid fa-check text-success fs-5"></i>
                            </td>
                            <td>
                                <i class="fa-solid fa-check text-success fs-5"></i>
                            </td>
                            <td>
                                <i class="fa-solid fa-check text-success fs-5"></i>
                            </td>
                            <td>
                                <i class="fa-solid fa-xmark text-danger fs-5"></i>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                Equipamiento <i class="fa-solid fa-circle-info text-primary ms-1"
                                    data-bs-toggle="tooltip" title="Equipo técnico incluido"></i>
                            </td>
                            <td>Bastones</td>
                            <td>Oxígeno</td>
                            <td>Binoculares</td>
                            <td>
                                <i class="fa-solid fa-xmark text-danger fs-5"></i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <script src="js/precios.js"></script>
    </main>

    <div id="footer-placeholder"></div>

    <!-- jQuery -->
    <script src="js/layout.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
